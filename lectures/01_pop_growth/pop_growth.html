<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Population Dynamics Lab </title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --primary: #d62728;
            --primary-hover: #b02021;
            --custom-blue: #007bff;
            --bg-light: #f8fafc;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: "Inter", sans-serif; 
            background-color: #f1f5f9; color: var(--text-main);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { 
            width: 300px; background: #ffffff; padding: 25px; 
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 12px; overflow-y: auto;
        }
        
        h1 { font-size: 1.1rem; font-weight: 800; margin: 0; color: var(--text-main); border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        .section-title { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 10px; }

        /* Controls */
        .control-group { margin-bottom: 5px; }
        .control-header { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 500; margin-bottom: 4px; }
        .control-val { color: var(--primary); font-weight: 700; }
        input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }
        
        .mode-selector {
            width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--bg-light); font-weight: 600; color: var(--text-main); cursor: pointer;
        }

        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        button { flex: 1; padding: 12px; font-weight: 700; border-radius: 6px; cursor: pointer; border: none; font-size: 0.85rem; transition: 0.2s; }
        #btnPlay { background: var(--primary); color: white; }
        #btnGridToggle { background: #64748b; color: white; }
        #btnReset { background: #cbd5e1; color: var(--text-main); }

        /* Main Content Layout */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: row; 
            overflow: hidden; 
            background: #cbd5e1; 
        }

        .grid-container { 
            flex: 0 0 700px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-right: 1px solid var(--border);
            border-bottom: none;
            overflow: hidden; 
            position: relative;
            cursor: grab;
        }

        .grid-container:active {
            cursor: grabbing;
        }

        /* 50/50 Right Panel Layout */
        .right-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-light); 
            min-width: 0; 
            overflow: hidden;
        }

        .plot-half {
            flex: 1; /* Takes up 50% height if image is shown, 100% if hidden */
            min-height: 0; 
            padding: 20px;
            display: flex;
        }

        #populationPlot {
            flex: 1;
            width: 100%;
        }

        .image-half {
            flex: 1; /* Takes bottom 50% */
            min-height: 0;
            padding: 20px;
            border-top: 1px solid var(--border);
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
            background: #ffffff;
        }

        #referenceImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            border-radius: 8px;
        }

        /* Zoom & Canvas Logic */
        #zoomWrapper {
            width: 200px; height: 200px; position: relative;
            transform-origin: center center; 
            border: 0.5px solid #000; 
            box-sizing: content-box; 
        }

        canvas { 
            background: #ffffff; 
            width: 200px; height: 200px; 
            image-rendering: pixelated; display: block; position: relative; z-index: 1;
        }

        /* Updated Grid Overlay Logic */
        #gridOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2; 
            opacity: 0; 
            transition: opacity 0.3s ease; 
            background-size: 1px 1px;
            background-image: url('data:image/svg+xml;utf8,<svg width="1" height="1" xmlns="http://www.w3.org/2000/svg"><rect width="1" height="1" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.1"/></svg>');
        }

        .dim-label {
            position: absolute; font-size: 7px; font-weight: 800; color: #1e293b;
            text-transform: uppercase; white-space: nowrap; background: rgba(255, 255, 255, 0.85);
            padding: 2px 4px; border: 0.5px solid var(--border); border-radius: 2px; z-index: 3;
        }
        .dim-width { bottom: -15px; left: 50%; transform: translateX(-50%); }
        .dim-height { left: -35px; top: 50%; transform: translateY(-50%) rotate(-90deg); }

        /* Visual Placement Picker */
        .placement-picker {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 5px;
        }

        .picker-card {
            background: var(--bg-light);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 80px;
        }

        .picker-card:hover { border-color: #cbd5e1; }

        .picker-card.active {
            border-color: var(--primary);
            background: #fff;
        }

        .picker-icon {
            width: 100%;
            aspect-ratio: 1 / 1; 
            background: white;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .picker-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .picker-card.active .picker-label { color: var(--primary); }

        .icon-dot { position: absolute; background: var(--primary); width: 15%; height: 15%; border-radius: 1px; }

        footer { height: 40px; background: #ffffff; border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="workspace">
        <aside class="sidebar">
            <h1>Population Growth</h1>
            
            <div class="btn-group">
                <button id="btnPlay" disabled>Loading Wasm...</button>
                <button id="btnReset">↺ Reset</button>
            </div>
            
            <span class="section-title">Timeline Controls</span>
            <div class="control-group">
                <div class="control-header"><label>Time steps in weeks (← / → keys)</label><span id="timeVal" class="control-val">0</span></div>
                <input type="range" id="timeSlider" min="0" max="150" value="0">
            </div>

            <div class="metrics-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px;">
                <div style="background: var(--bg-light); border: 1px solid var(--border); border-radius: 8px; padding: 10px;">
                    <div style="font-size: 0.6rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700;">Total N</div>
                    <div id="agentCount" style="font-size: 1.2rem; font-weight: bold; color: var(--primary); font-family: monospace;">0</div>
                </div>
                
                <div style="background: var(--bg-light); border: 1px solid var(--border); border-radius: 8px; padding: 10px;">
                    <div style="font-size: 0.6rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700;">New N</div>
                    <div id="newAgentCount" style="font-size: 1.2rem; font-weight: bold; color: var(--custom-blue); font-family: monospace;">0</div>
                </div>
            </div>

            <span class="section-title">Parameters</span>
            <div class="control-group">
                <div class="control-header"><label>Initial individuals (N₀)</label><span id="initValue" class="control-val">1</span></div>
                <input type="range" id="initSlider" min="1" max="100" step="1" value="1">
            </div>

            <div class="control-group">
                <div class="control-header"><label>Growth rate (α)</label><span id="alphaValue" class="control-val">0.10</span></div>
                <input type="range" id="alphaSlider" min="0.01" max="0.5" step="0.01" value="0.10">
            </div>
            <div class="control-group">
                <div class="control-header"><label>Moving radius (R)</label><span id="jumpValue" class="control-val">2</span></div>
                <input type="range" id="jumpSlider" min="0" max="10" step="1" value="2">
            </div>

            <span class="section-title">View Options</span>
            <div class="control-group">
                <div class="control-header"><label>Zoom</label><span id="zoomVal" class="control-val">16.0x</span></div>
                <input type="range" id="zoomSlider" min="1.0" max="16.0" step="0.1" value="16.0">
            </div>

            <div class="control-group">
                <div class="control-header"><label>Initial Layout</label></div>
                <div class="placement-picker" id="placementPicker">
                    <div class="picker-card" data-value="random">
                        <div class="picker-icon">
                            <div class="icon-dot" style="top:20%; left:60%"></div>
                            <div class="icon-dot" style="top:70%; left:10%"></div>
                            <div class="icon-dot" style="top:40%; left:20%"></div>
                        </div>
                        <div class="picker-label">Random</div>
                    </div>
                    <div class="picker-card active" data-value="circle">
                        <div class="picker-icon">
                            <div class="icon-dot" style="top:40%; left:40%; width:20%; height:20%; border-radius:0;"></div>
                        </div>
                        <div class="picker-label">Center</div>
                    </div>
                    <div class="picker-card" data-value="grid">
                        <div class="picker-icon">
                            <div class="icon-dot" style="top:20%; left:20%"></div><div class="icon-dot" style="top:20%; left:65%"></div>
                            <div class="icon-dot" style="top:65%; left:20%"></div><div class="icon-dot" style="top:65%; left:65%"></div>
                        </div>
                        <div class="picker-label">Grid</div>
                    </div>
                </div>
            </div>

            <span class="section-title">Data Evaluation</span>
            <div class="control-group">
                <select class="mode-selector" id="dataSelect">
                    <option value="none">No Data</option>
                    <option value="case1">Australia</option>
                    <option value="case2">Taiwan</option>
                </select>
            </div>
        </aside>

        <main class="main-content" id="mainView">
            <div class="grid-container">
                <div id="zoomWrapper">
                    <div id="gridOverlay"></div>
                    <div class="dim-label dim-width">200px</div>
                    <div class="dim-label dim-height">200px</div>
                    <canvas id="gridCanvas" width="200" height="200"></canvas>
                </div>
            </div>
            <div class="right-panel">
                <div class="plot-half">
                    <div id="populationPlot"></div>
                </div>
                <div class="image-half" id="imageHalf">
                    <img id="referenceImage" src="taiwan_covid_cases.png" alt="Taiwan Reference Data">
                </div>
            </div>
        </main>
    </div>

    <footer>Made with <span style="color: var(--primary); margin: 0 4px;">❤</span> by Phillip Papastefanou</footer>

    <script src="model_fast.js"></script>

    <script>
        const WIDTH = 200, HEIGHT = 200, MAX_STEPS = 150;
        let gridView, isPlaying = false, animationId, timeStep = 0, isGridRequested = false;
        let wasmStepSimulation, wasmClearGrid, wasmSetSeed;
        let gridHistory = [], popHistory = [], newPopHistory = [];
        let currentPlacement = 'circle'; 

        // Panning variables
        let panX = 0, panY = 0, isDragging = false, startX, startY;

        const datasets = {
            none: null,
            case1: { 
                name: "Australia Data",
                x: [30, 39, 49, 58, 67, 76, 86, 95, 104, 113, 123, 132], 
                y: [7677, 10370, 15757, 20760, 26147, 29610, 34228, 36537, 37114, 37499, 38461, 40000] 
            },
            case2: { 
                name: "Taiwan Data",
                x: [5, 16, 30, 42, 53, 65, 79, 91, 103, 115, 128, 140], 
                y: [85, 94, 107, 555, 9507, 17565, 20923, 24280, 29652, 35024, 37485, 39500] 
            }
        };

        const canvas = document.getElementById('gridCanvas'), ctx = canvas.getContext('2d');
        const zoomWrapper = document.getElementById('zoomWrapper'), gridOverlay = document.getElementById('gridOverlay');
        const timeS = document.getElementById('timeSlider'), zoomS = document.getElementById('zoomSlider');
        const btnPlay = document.getElementById('btnPlay');

        function updateTransform() {
            zoomWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomS.value})`;
        }

        createModule().then(Module => {
            wasmStepSimulation = Module.cwrap('stepSimulation', 'number', ['number', 'number', 'number']);
            wasmClearGrid = Module.cwrap('clearGrid', null, []);
            wasmSetSeed = Module.cwrap('setSeed', null, ['number']);
            const getGridPointer = Module.cwrap('getGridPointer', 'number', []);
            
            const ptr = getGridPointer();
            const buffer = (Module.wasmMemory && Module.wasmMemory.buffer) || (Module.HEAPU8 && Module.HEAPU8.buffer);
            gridView = new Uint8Array(buffer, ptr, WIDTH * HEIGHT);

            btnPlay.disabled = false;
            btnPlay.innerText = "▶ Run";
            initApp();
        });

        function syncToStep(target) {
            if (target > gridHistory.length - 1) {
                while (gridHistory.length - 1 < target) performSingleWasmStep();
            }
            timeStep = target;
            gridView.set(gridHistory[timeStep]);
            updateDisplay();
        }

        function updateGridVisibility() {
            const z = parseFloat(zoomS.value);
            gridOverlay.style.opacity = (z >= 6.0) ? '1' : '0';
        }


        function updateTransform() {
            zoomWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomS.value})`;
        }           

        function initApp() {
            btnPlay.onclick = () => {
                if(timeStep >= MAX_STEPS) resetAndPrecalc();
                isPlaying = !isPlaying;
                btnPlay.innerText = isPlaying ? "⏸ Pause" : "▶ Resume";
                if(isPlaying) runLoop();
            };

            document.getElementById('btnReset').onclick = resetAndPrecalc;
            
            zoomS.oninput = () => {
                updateTransform();
                document.getElementById('zoomVal').innerText = parseFloat(zoomS.value).toFixed(1) + "x";
                updateGridVisibility();
            };

            const gridContainer = document.querySelector('.grid-container');

            gridContainer.addEventListener('wheel', (e) => {
                e.preventDefault(); // Prevent page scroll
                
                const zoomSpeed = 0.5; 
                let currentZoom = parseFloat(zoomS.value);

                if (e.deltaY < 0) {
                    // Scroll Up = Zoom In
                    currentZoom = Math.min(16.0, currentZoom + zoomSpeed);
                } else {
                    // Scroll Down = Zoom Out
                    currentZoom = Math.max(1.0, currentZoom - zoomSpeed);
                }

                // Sync slider and trigger visual updates
                zoomS.value = currentZoom;
                updateTransform();
                document.getElementById('zoomVal').innerText = currentZoom.toFixed(1) + "x";
                updateGridVisibility();
            }, { passive: false });

            gridContainer.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return; // Only react to left mouse button
                isDragging = true;
                startX = e.clientX - panX;
                startY = e.clientY - panY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                panX = e.clientX - startX;
                panY = e.clientY - startY;
                updateTransform();
            });

            window.addEventListener('mouseup', () => { 
                isDragging = false; 
            });

            timeS.oninput = () => {
                isPlaying = false;
                btnPlay.innerText = "▶ Resume";
                const maxAvailable = popHistory.length - 1;
                let target = parseInt(timeS.value);
                if (target > maxAvailable) {
                    target = maxAvailable;
                    timeS.value = target; 
                }
                syncToStep(target);
            };

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    isPlaying = false;
                    btnPlay.innerText = "▶ Resume";
                    syncToStep(Math.min(MAX_STEPS, timeStep + 1));
                } else if (e.key === 'ArrowLeft') {
                    isPlaying = false;
                    btnPlay.innerText = "▶ Resume";
                    syncToStep(Math.max(0, timeStep - 1));
                }
            });

            ['initSlider', 'alphaSlider', 'jumpSlider'].forEach(id => {
                const s = document.getElementById(id);
                s.oninput = () => {
                    document.getElementById(id.replace('Slider', 'Value')).innerText = s.value;
                    resetAndPrecalc();
                };
            });
            
            const cards = document.querySelectorAll('.picker-card');
            cards.forEach(card => {
                card.onclick = () => {
                    cards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    currentPlacement = card.getAttribute('data-value');
                    resetAndPrecalc();
                };
            });

            document.getElementById('dataSelect').onchange = updateDisplay;


            

            zoomS.oninput();
            resetAndPrecalc();
        }

        function resetAndPrecalc() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            btnPlay.innerText = "▶ Run";
            
            // Reset panning to center
            panX = 0;
            panY = 0;
            updateTransform();

            wasmClearGrid();
            wasmSetSeed(Date.now() >>> 0);
            
            const n = parseInt(document.getElementById('initSlider').value);
            const placement = currentPlacement;
            let placed = 0;
            const cx = WIDTH / 2, cy = HEIGHT / 2;

            if (placement === 'random') {
                while(placed < n) {
                    let idx = Math.floor(Math.random() * WIDTH * HEIGHT);
                    if(gridView[idx] === 0) { gridView[idx] = 1; placed++; }
                }
            } else if (placement === 'circle') {
                const radius = Math.max(5, Math.sqrt(n) * 1.5); 
                while(placed < n) {
                    const angle = Math.random() * 2 * Math.PI;
                    const r = Math.sqrt(Math.random()) * radius;
                    const px = Math.round(cx + r * Math.cos(angle));
                    const py = Math.round(cy + r * Math.sin(angle));
                    if (px >= 0 && px < WIDTH && py >= 0 && py < HEIGHT) {
                        let idx = py * WIDTH + px;
                        if (gridView[idx] === 0) { gridView[idx] = 1; placed++; }
                    }
                }
            } else if (placement === 'grid') {
                const cols = Math.ceil(Math.sqrt(n));
                const rows = Math.ceil(n / cols);
                const dx = WIDTH / (cols + 1);
                const dy = HEIGHT / (rows + 1);
                for(let r = 1; r <= rows && placed < n; r++) {
                    for(let c = 1; c <= cols && placed < n; c++) {
                        const px = Math.round(c * dx);
                        const py = Math.round(r * dy);
                        let idx = py * WIDTH + px;
                        if(gridView[idx] === 0) { gridView[idx] = 1; placed++; }
                    }
                }
            }

            gridHistory = [new Uint8Array(gridView)];
            popHistory = [n];
            newPopHistory = [0];
            timeStep = 0;
            updateDisplay();
        }

        function performSingleWasmStep() {
            const previousCount = popHistory.length > 0 ? popHistory[popHistory.length - 1] : 0;
            const count = wasmStepSimulation(
                parseFloat(document.getElementById('alphaSlider').value),
                parseInt(document.getElementById('jumpSlider').value),
                0
            );

            gridHistory.push(new Uint8Array(gridView));
            popHistory.push(count);
            const diff = count - previousCount;
            newPopHistory.push(diff);
        }

        function runLoop() {
            if (isPlaying && timeStep < MAX_STEPS) {
                performSingleWasmStep();
                timeStep++;
                updateDisplay();
                setTimeout(runLoop, 30);
            } else {
                isPlaying = false;
                btnPlay.innerText = "▶ Run";
            }
        }

        function updateDisplay() {
            timeS.value = timeStep;
            document.getElementById('timeVal').innerText = timeStep;
            document.getElementById('agentCount').innerText = popHistory[timeStep];
            document.getElementById('newAgentCount').innerText = newPopHistory[timeStep] || 0;
            drawToCanvas();
            refreshPlotly();
        }

        function drawToCanvas() {
            const img = ctx.createImageData(WIDTH, HEIGHT);
            for (let i = 0; i < WIDTH * HEIGHT; i++) {
                if (gridView[i] === 0) continue;
                let px = i * 4;
                img.data[px] = gridView[i] === 1 ? 214 : 0;
                img.data[px+1] = gridView[i] === 1 ? 39 : 123;
                img.data[px+2] = gridView[i] === 1 ? 40 : 255;
                img.data[px+3] = 255;
            }
            ctx.putImageData(img, 0, 0);
        }

        function refreshPlotly() {
            const dataKey = document.getElementById('dataSelect').value;
            const imageHalf = document.getElementById('imageHalf');
            
            // GATE: Only update the DOM if the state actually needs to change!
            const wantsImage = (dataKey === 'case2');
            const hasImage = (imageHalf.style.display === 'flex');
            
            if (wantsImage && !hasImage) {
                imageHalf.style.display = 'flex';
                // Force Plotly to instantly snap to the new 50% height
                setTimeout(() => Plotly.Plots.resize('populationPlot'), 10);
            } else if (!wantsImage && hasImage) {
                imageHalf.style.display = 'none';
                // Force Plotly to instantly snap back to 100% height
                setTimeout(() => Plotly.Plots.resize('populationPlot'), 10);
            }

            let plotData = [{
                x: Array.from({length: timeStep + 1}, (_, i) => i),
                y: popHistory.slice(0, timeStep + 1),
                type: 'scatter', mode: 'lines', line: { color: '#d62728', width: 3 }, name: 'Simulation'
            }];
            
            let layoutShapes = [], layoutAnnotations = [];
            let yAxisConfig = { title: 'N', autorange: true };

            if (dataKey !== 'none') {
                // Fixed Y-axis at 40,000 as requested
                yAxisConfig = { title: 'N', range: [0, 40000] };
                const data = datasets[dataKey];
                
                plotData.push({
                    x: data.x, y: data.y,
                    type: 'scatter', mode: 'markers', 
                    marker: { color: '#1e293b', size: 8, symbol: 'circle-open', line: {width: 2} },
                    name: data.name
                });

                let absErrorSum = 0, count = 0;
                for (let i = 0; i < data.x.length; i++) {
                    let t = data.x[i];
                    if (t <= timeStep && t < popHistory.length) {
                        absErrorSum += Math.abs(popHistory[t] - data.y[i]);
                        count++;
                    }
                }

                if (count > 0) {
                    const mae = Math.round(absErrorSum / count).toLocaleString();
                    layoutAnnotations.push({
                        x: 0, y: 1.1, xref: 'paper', yref: 'paper',
                        text: `<b>MEAN ABSOLUTE ERROR:</b> ${mae} units`,
                        showarrow: false, font: { size: 14, family: 'monospace' },
                        align: 'left', bgcolor: 'rgba(255, 255, 255, 0.8)'
                    });
                }
            } else {
                const currentMax = Math.max(...popHistory);
                yAxisConfig = { title: 'N', range: [0, Math.max(2, currentMax * 1.1)] };
            }

            Plotly.react('populationPlot', plotData, {
                margin: { t: 40, r: 20, b: 40, l: 60 },
                xaxis: { title: 'Step (Weeks)', range: [0, MAX_STEPS] },
                yaxis: yAxisConfig,
                shapes: layoutShapes,
                annotations: layoutAnnotations,
                showlegend: true,
                legend: { x: 0.05, y: 0.95, bgcolor: 'rgba(255,255,255,0.8)' },
                paper_bgcolor: 'rgba(0,0,0,0)', 
                plot_bgcolor: 'rgba(0,0,0,0)'
            }, { responsive: true, displayModeBar: false });
        }

    </script>
</body>
</html>
