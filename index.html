<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ecological Modelling Lab</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 50px; color: #1e293b; }
        .container { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { border-bottom: 3px solid #d62728; padding-bottom: 10px; }
        .lecture-list { list-style: none; padding: 0; margin-top: 30px; }
        .lecture-item { 
            padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px; 
            margin-bottom: 15px; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .lecture-item:hover { border-color: #d62728; background: #fff8f8; }
        
        .lecture-info { flex-grow: 1; }
        .lecture-title { font-size: 1.1rem; font-weight: 800; color: #1e293b; margin-bottom: 5px; }
        .lecture-desc { color: #64748b; font-size: 0.9rem; }
        
        .links-group { display: flex; gap: 10px; align-items: center; }
        
        .btn-link { 
            text-decoration: none; padding: 8px 12px; border-radius: 6px; 
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
            transition: 0.2s; white-space: nowrap;
        }
        
        /* Interactive Button style */
        .btn-interactive { background: #d62728; color: white; }
        .btn-interactive:hover { background: #b02021; }
        
        /* Slides Button style */
        .btn-slides { background: #64748b; color: white; }
        .btn-slides:hover { background: #475569; }

        .badge { background: #e2e8f0; color: #475569; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ecological Modelling Lab</h1>
        <p>Interactive simulations and spatial dynamics models.</p>
        
        <ul class="lecture-list">
            <li class="lecture-item">
                <div class="lecture-info">
                    <div class="lecture-title">01. Population Growth <span class="badge">Wasm</span></div>
                    <div class="lecture-desc">Spatial Agent-Based Model with Wasm Engine.</div>
                </div>
                
                <div class="links-group">
                    <a class="btn-link btn-slides" href="/EcologicalModelling/lectures/01_pop_growth/01_populaitonswachseum.pdf" target="_blank">
                        📄 Slides
                    </a>
                    
                    <a class="btn-link btn-interactive" href="/EcologicalModelling/lectures/01_pop_growth/pop_growth.html">
                        🚀 Interactive
                    </a>
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
